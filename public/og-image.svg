<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Green ambient glow (top-right) -->
  <circle cx="950" cy="100" r="250" fill="#22c55e" opacity="0.04" filter="url(#subtleGlow)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#222" stroke-width="1"/>

  <!-- RP Logo Badge -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="url(#greenGlow)"/>
  <text x="108" y="116" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">RP</text>

  <!-- Brand Name -->
  <text x="152" y="116" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#ffffff">RolePatch</text>

  <!-- Main Heading -->
  <text x="80" y="200" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#ffffff">AI Resume Tailoring</text>

  <!-- Tagline with green accent -->
  <text x="80" y="260" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#9ca3af">See Every Change</text>
  <text x="80" y="260" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#9ca3af">
    <tspan fill="#4ade80">See Every Change</tspan>
  </text>

  <!-- Diff Visualization Panel -->
  <rect x="80" y="310" width="1040" height="220" rx="12" fill="#111111" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- Panel header dots -->
  <circle cx="108" cy="336" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="126" cy="336" r="5" fill="#eab308" opacity="0.8"/>
  <circle cx="144" cy="336" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="180" y="341" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#555">resume-diff.patch</text>

  <!-- Divider line -->
  <line x1="80" y1="358" x2="1120" y2="358" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Column headers -->
  <text x="120" y="385" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="600" fill="#6b7280" text-transform="uppercase" letter-spacing="2">ORIGINAL</text>
  <line x1="600" y1="358" x2="600" y2="530" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="640" y="385" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="600" fill="#6b7280" text-transform="uppercase" letter-spacing="2">TAILORED</text>

  <!-- Diff Line 1 -->
  <rect x="96" y="400" width="488" height="32" rx="4" fill="#7f1d1d" opacity="0.3"/>
  <text x="108" y="421" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#fca5a5">
    <tspan fill="#ef4444" opacity="0.5">- </tspan>Managed a team of engineers
  </text>

  <rect x="616" y="400" width="488" height="32" rx="4" fill="#14532d" opacity="0.3"/>
  <text x="628" y="421" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#86efac">
    <tspan fill="#22c55e" opacity="0.5">+ </tspan>Led 8 cross-functional engineers
  </text>

  <!-- Diff Line 2 -->
  <rect x="96" y="440" width="488" height="32" rx="4" fill="#7f1d1d" opacity="0.3"/>
  <text x="108" y="461" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#fca5a5">
    <tspan fill="#ef4444" opacity="0.5">- </tspan>Worked on backend systems
  </text>

  <rect x="616" y="440" width="488" height="32" rx="4" fill="#14532d" opacity="0.3"/>
  <text x="628" y="461" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#86efac">
    <tspan fill="#22c55e" opacity="0.5">+ </tspan>Architected distributed microservices
  </text>

  <!-- Diff Line 3 -->
  <rect x="96" y="480" width="488" height="32" rx="4" fill="#7f1d1d" opacity="0.3"/>
  <text x="108" y="501" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#fca5a5">
    <tspan fill="#ef4444" opacity="0.5">- </tspan>Improved performance
  </text>

  <rect x="616" y="480" width="488" height="32" rx="4" fill="#14532d" opacity="0.3"/>
  <text x="628" y="501" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#86efac">
    <tspan fill="#22c55e" opacity="0.5">+ </tspan>Reduced latency 40% via caching
  </text>

  <!-- ATS Score Badge -->
  <rect x="80" y="558" width="200" height="48" rx="24" fill="#0a0a0a" stroke="#22c55e" stroke-width="2"/>
  <text x="116" y="588" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#ffffff">ATS:</text>
  <text x="158" y="588" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#ef4444">42</text>
  <text x="183" y="588" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#6b7280">\u2192</text>
  <text x="210" y="588" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="800" fill="#22c55e" filter="url(#glow)">87</text>

  <!-- URL -->
  <text x="1120" y="588" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#4b5563" text-anchor="end">rolepatch.com</text>
</svg>