name = "resume-tailor"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat_v2"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

[vars]
NODE_ENV = "production"
